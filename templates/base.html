<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CaseDesk{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="1" y="1" width="8" height="8" fill="#f25022"/>
      <rect x="11" y="1" width="8" height="8" fill="#7fba00"/>
      <rect x="1" y="11" width="8" height="8" fill="#00a4ef"/>
      <rect x="11" y="11" width="8" height="8" fill="#ffb900"/>
    </svg>
    <span>CaseDesk</span>
  </div>
  {% if session.user %}
  <div class="nav-links">
    <a href="{{ url_for('dashboard') }}" {% if request.endpoint=='dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('cases') }}" {% if request.endpoint in ['cases','case_detail'] %}class="active"{% endif %}>Cases</a>
    <a href="{{ url_for('new_case') }}" class="btn-nav">+ New Case</a>
  </div>
  <div class="nav-user">
    <span class="role-badge {{ session.role }}">{{ session.role }}</span>
    <span>{{ session.user }}</span>
    <a href="{{ url_for('logout') }}">Logout</a>
  </div>
  {% endif %}
</nav>

<main class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

</body>
</html>
